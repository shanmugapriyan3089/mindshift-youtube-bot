name: Agent 10 — Instagram Reels

# Runs 30 minutes after daily Shorts pipeline to give YouTube time to process
on:
  schedule:
    - cron: "30 5 * * *"    # 05:30 UTC daily (30 min after Shorts pipeline at 05:00)
    - cron: "30 11 * * *"   # 11:30 UTC daily
  workflow_dispatch:         # Manual trigger

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests yt-dlp
          pip install google-auth google-auth-oauthlib google-api-python-client
          pip install groq python-dotenv

      - name: Restore YouTube token
        run: |
          echo "$YOUTUBE_TOKEN" | base64 -d > youtube_token.pickle
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}

      - name: Run Instagram agent
        run: python -m agents.instagram_agent
        env:
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          YOUTUBE_COOKIES:        ${{ secrets.YOUTUBE_COOKIES }}
          NOTIFY_EMAIL:           ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}

      - name: Save Instagram log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add instagram_log.json || true
          git diff --cached --quiet || git commit -m "chore: update instagram log [skip ci]"
          git push || true
