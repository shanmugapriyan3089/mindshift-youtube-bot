name: Stock Footage — Regular Video

on:
  schedule:
    - cron: '30 6 * * *'   # 12:00 PM IST (6:30 AM UTC)
  workflow_dispatch:

jobs:
  generate-stock-regular:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra espeak libespeak1 espeak-ng libespeak-ng1

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: kokoro-model-${{ runner.os }}-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > youtube_token.pickle
        continue-on-error: true

      - name: Write YouTube client secrets
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Restore used topics log
        uses: actions/cache@v4
        with:
          path: used_topics_stock.json
          key: used-topics-stock-${{ github.run_number }}
          restore-keys: used-topics-stock-

      - name: Run stock footage regular pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRETS_PATH: client_secrets.json
          MADE_FOR_KIDS: "false"
        run: python main_stock.py --type regular

      - name: Save upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: upload-log-stock-regular-${{ github.run_number }}
          path: upload_log.json
