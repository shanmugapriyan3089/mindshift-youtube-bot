name: Agent 1 — Trend Scout (Weekly)

on:
  schedule:
    - cron: '30 3 * * 1'  # Every Monday 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:

jobs:
  trend-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests python-dotenv

      - name: Run Trend Scout Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m agents.trend_scout

      - name: Commit updated topics to repo
        run: |
          git config user.name "MindShift Trend Bot"
          git config user.email "bot@mindshiftproductivity.com"
          git add config.py agents_state/ || true
          git diff --staged --quiet || git commit -m "Auto: update trending topics [skip ci]"
          git push
