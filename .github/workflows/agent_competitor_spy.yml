name: Agent 2 — Competitor Spy (Weekly)

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday 9:30 AM IST (4:00 AM UTC)
  workflow_dispatch:

jobs:
  competitor-spy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests google-auth google-auth-oauthlib google-api-python-client python-dotenv

      - name: Restore YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > youtube_token.pickle

      - name: Write YouTube client secrets
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Run Competitor Spy Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_SECRETS_PATH: client_secrets.json
        run: python -m agents.competitor_spy

      - name: Commit updated patterns to repo
        run: |
          git config user.name "MindShift Competitor Bot"
          git config user.email "bot@mindshiftproductivity.com"
          git add config.py
          git diff --staged --quiet || git commit -m "Auto: update winning tags + title formulas from competitor intel [skip ci]"
          git push
