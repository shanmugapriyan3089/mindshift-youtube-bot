name: Daily Regular Video

on:
  schedule:
    - cron: '0 3 * * *'   # 8:30 AM IST (3:00 AM UTC)
  workflow_dispatch:

jobs:
  generate-regular-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra espeak libespeak1 espeak-ng libespeak-ng1

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: kokoro-model-${{ runner.os }}-v1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "YOUTUBE_CLIENT_SECRETS_PATH=client_secrets.json" >> .env
          echo "MADE_FOR_KIDS=false" >> .env

      - name: Restore YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > youtube_token.pickle
        continue-on-error: true

      - name: Write YouTube client secrets
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Restore used topics log
        uses: actions/cache@v4
        with:
          path: used_topics.json
          key: used-topics-${{ github.run_number }}
          restore-keys: used-topics-

      - name: Run regular video pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_SECRETS_PATH: client_secrets.json
          MADE_FOR_KIDS: "false"
          PYTHONUNBUFFERED: "1"
          PIPELINE_SLOT: "0"
        run: timeout 5000 python -u main.py --type regular

      - name: Save upload log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add upload_log.json used_titles.json || true
          git diff --cached --quiet || git commit -m "chore: update upload log [skip ci]"
          for i in 1 2 3; do git push && break || (git pull --rebase origin main && sleep $((i*5))); done || true
