name: Agent 6 — Quora Content (Mon/Wed/Fri)

on:
  schedule:
    - cron: '0 9 * * 1,3,5'  # Mon/Wed/Fri 2:30 PM IST (9:00 AM UTC)
  workflow_dispatch:

jobs:
  quora-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests python-dotenv

      - name: Run Quora Content Agent
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m agents.quora_agent

      - name: Commit agent report
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add agents_state/ || true
          git diff --cached --quiet || git commit -m "chore: update quora agent report [skip ci]"
          git push || true
