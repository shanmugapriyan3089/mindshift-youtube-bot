name: Agent 8 — Twitter Auto-Post

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 UTC daily — 30 min after morning uploads finish
    - cron: "0 12 * * *"  # 12:00 UTC daily — 30 min after afternoon uploads finish
  workflow_dispatch:       # Manual trigger

jobs:
  post-to-twitter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tweepy requests python-dotenv

      - name: Restore upload log
        run: |
          echo "$UPLOAD_LOG" | base64 -d > upload_log.json || echo "[]" > upload_log.json
        env:
          UPLOAD_LOG: ${{ secrets.UPLOAD_LOG }}

      - name: Run Twitter agent
        run: python -m agents.twitter_poster
        env:
          TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
