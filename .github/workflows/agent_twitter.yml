name: Agent 8 — Twitter Auto-Post

on:
  schedule:
    - cron: "0 6 * * *"    # 6:00 UTC — after morning upload
    - cron: "0 12 * * *"   # 12:00 UTC — midday
    - cron: "0 18 * * *"   # 18:00 UTC — evening
  workflow_dispatch:        # Manual trigger

jobs:
  post-to-twitter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # needed to commit state files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tweepy groq yt-dlp requests python-dotenv

      - name: Run Twitter agent
        run: python -m agents.twitter_poster
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit updated state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet_log.json tweet_count.json || true
          git diff --cached --quiet || git commit -m "chore: update twitter state [skip ci]"
          git push
