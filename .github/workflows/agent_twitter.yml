name: Agent 8 — Twitter Auto-Post

on:
  schedule:
    - cron: "0 3 * * *"    # 3:00 UTC  = 8:30 AM IST  — morning commute peak
    - cron: "0 8 * * *"    # 8:00 UTC  = 1:30 PM IST  — afternoon break
    - cron: "0 14 * * *"   # 14:00 UTC = 7:30 PM IST  — evening prime time
  workflow_dispatch:        # Manual trigger

jobs:
  post-to-twitter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # needed to commit state files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tweepy groq yt-dlp requests python-dotenv

      - name: Run Twitter agent
        run: python -m agents.twitter_poster
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit updated state files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet_log.json tweet_count.json twitter_promo_log.json || true
          git diff --cached --quiet || git commit -m "chore: update twitter state [skip ci]"
          git pull --rebase origin main || true
          git push || true
